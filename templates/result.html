<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ city }} - Travel Safety Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-wrapper">
    <main class="page-content">
        <section class="card result-card">
            <h2>{{ city }}</h2>
            <p class="small-text">Danger Level: <strong>{{ risk.label }}</strong></p>
            <div class="status-tag {{ risk.label | lower }}">{{ risk.label }}</div>
            <p class="desc">{{ risk.description }}</p>

            <div class="city-image">
                <img src="{{ url_for('static', filename=risk.image) }}" alt="{{ city }} location image" onerror="this.style.display='none'">
            </div>

            <div class="info-row">
                <div class="info-card">
                    <strong>Temperature</strong>
                    <p>{{ weather.temperature }} °C</p>
                </div>
                <div class="info-card">
                    <strong>Condition</strong>
                    <p>{{ weather.description | capitalize }}</p>
                </div>
            </div>

            <div class="map-box">
                <iframe src="https://www.google.com/maps?q={{ city }}&output=embed" allowfullscreen loading="lazy"></iframe>
            </div>

            <div class="button-row">
                {% if not is_favorite %}
                    <form method="POST" action="{{ url_for('main.add_favorite', city=city) }}">
                        <button type="submit">Save favorite</button>
                    </form>
                {% endif %}
                <a href="{{ url_for('main.dashboard') }}" class="btn-link">Go Back</a>
            </div>
        </section>
    </main>
</body>
</html>
